<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社内イントラDX</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/intranet-lp/style.css?v=6">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="promo">おすすめプラン：50,000円（人気No.1）</div>

<section class="hero">
<h1>社内業務を、もっとシンプルに。</h1>
<p>すべてを一つに集約した次世代イントラ</p>
<button onclick="scrollToPlans()">プランを見る</button>
</section>

<!-- PRICING -->
<section class="pricing" id="plans">
<h2>プランを選択</h2>

<div class="plans">

<div class="plan" onclick="selectPlan(this,'light')">
<h3>ライト</h3>
<h1>30,000円</h1>
<button onclick="toggleDetails(event,'light')">もっと見る</button>
</div>

<div class="plan recommended" onclick="selectPlan(this,'standard')">
<div class="badge">おすすめ</div>
<h3>スタンダード</h3>
<h1>50,000円</h1>
<button onclick="toggleDetails(event,'standard')">もっと見る</button>
</div>

</div>

<!-- DETAILS -->
<div id="details-light" class="details">
<ul>
<li>勤怠管理</li>
<li>社内チャット</li>
<li>カレンダー</li>
<li>通知機能</li>
</ul>
</div>

<div id="details-standard" class="details">
<ul>
<li>勤怠管理</li>
<li>社内チャット</li>
<li>社内報</li>
<li>カレンダー</li>
<li>AI日報</li>
<li>通知機能</li>
<li>メンバー管理</li>
<li>連絡先管理</li>
<li>緊急連絡先</li>
</ul>
</div>

</section>

<!-- CONTACT -->
<section class="contact hidden" id="contact">
<h2>お問い合わせ</h2>

<p id="selectedPlanText"></p>

<form action="mailto:shiela.concepcion@gbi.co.jp?subject=お問い合わせ" method="POST" enctype="text/plain">

<input name="会社名" placeholder="会社名" required>
<input type="email" name="メール" placeholder="メール" required>
<textarea name="内容" placeholder="内容" required></textarea>

<input type="hidden" name="選択プラン" id="planInput">

<button type="submit">送信</button>

</form>

</section>

<footer>© 2026 社内イントラDX</footer>

<script>

// scroll to plans
function scrollToPlans(){
document.getElementById("plans").scrollIntoView({behavior:"smooth"});
}

// select plan
function selectPlan(el,plan){

document.querySelectorAll(".plan").forEach(p=>p.classList.remove("active"));
el.classList.add("active");

// show contact with animation
const contact = document.getElementById("contact");
contact.classList.remove("hidden");

setTimeout(()=>{
contact.classList.add("show");
},10);

// set selected plan text
let planName = plan === "light" ? "ライトプラン" : "スタンダードプラン";
document.getElementById("selectedPlanText").innerText =
"選択中：" + planName;

// add to form
document.getElementById("planInput").value = planName;

// scroll smoothly
setTimeout(()=>{
contact.scrollIntoView({behavior:"smooth"});
},300);
}

// toggle details
function toggleDetails(event,plan){

event.stopPropagation();

document.querySelectorAll(".details").forEach(d=>{
d.classList.remove("show");
});

const target = document.getElementById("details-"+plan);
target.classList.add("show");

target.scrollIntoView({behavior:"smooth"});
}

</script>

</body>
</html>
