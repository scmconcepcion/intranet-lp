<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<body>

<div class="promo">おすすめプラン：50,000円（人気No.1）</div>

<!-- HERO -->
<section class="hero">
<h1>社内業務を、もっとシンプルに。</h1>
<p>すべてを一つに集約した次世代イントラ</p>

<a href="#plans">
<button>プランを見る</button>
</a>
</section>

<!-- PRICING -->
<section class="pricing" id="plans">
<h2>プランを選択</h2>

<div class="plans">

<!-- LIGHT -->
<div class="plan">
<h3>ライト</h3>
<h1>30,000円</h1>

<ul>
<li>勤怠管理</li>
<li>社内チャット</li>
<li>カレンダー</li>
<li>通知機能</li>
</ul>

<details>
<summary>もっと見る</summary>
<ul>
<li>基本サポート</li>
<li>簡易レポート</li>
</ul>
</details>

</div>

<!-- STANDARD -->
<div class="plan recommended">
<div class="badge">おすすめ</div>
<h3>スタンダード</h3>
<h1>50,000円</h1>

<ul>
<li>勤怠管理</li>
<li>社内チャット</li>
<li>社内報</li>
<li>カレンダー</li>
<li>AI日報</li>
</ul>

<details>
<summary>もっと見る</summary>
<ul>
<li>通知機能</li>
<li>メンバー管理</li>
<li>連絡先管理</li>
<li>緊急連絡先</li>
</ul>
</details>

</div>

</div>
</section>

<!-- CONTACT -->
<section class="contact" id="contact">
<h2>お問い合わせ</h2>

<form action="mailto:shiela.concepcion@gbi.co.jp?subject=お問い合わせ" method="POST" enctype="text/plain">

<input name="会社名" placeholder="会社名" required>
<input type="email" name="メール" placeholder="メール" required>
<textarea name="内容" placeholder="内容" required></textarea>

<button type="submit">送信</button>

</form>

</section>

<footer>© 2026 社内イントラDX</footer>

</body>
</html>
